bind b run-shell '\
if ! tmux has-session -t bookmarks 2>/dev/null; then \
  tmux new-session -s bookmarks -c "$HOME/Documents/Areas/Obsidian/bookmarks/" -d nvim bookmarks.yml;\
fi; \
tmux switch-client -t bookmarks'

bind p run-shell '\
if ! tmux has-session -t personal 2>/dev/null; then \
  tmux new-session -s personal -c "$HOME/Documents/Areas/Obsidian/personal/" -d nvim index.md;\
fi; \
tmux switch-client -t personal'

bind r run-shell '\
if ! tmux has-session -t random 2>/dev/null; then \
  tmux new-session -s random -d
fi; \
tmux switch-client -t random'

bind v run-shell '\
if ! tmux has-session -t time 2>/dev/null; then \
  tmux new-session -s time -d
fi; \
tmux switch-client -t time'

# Toggle between 2 panes with auto-zoom
bind -r j select-pane -t .+1 \;  resize-pane -Z

bind C-z display-popup -h80% -w80% -E '\
new_dir=$(zoxide query --interactive);\
tmux split-window -h -c $new_dir;\
'

bind n run-shell '\
if ! tmux has-session -t "w/notes" 2>/dev/null; then \
  tmux new-session -s "w/notes" -c "$HOME/Documents/Areas/Obsidian/work" -d nvim index.md;\
fi; \
tmux switch-client -t "w/notes"'

