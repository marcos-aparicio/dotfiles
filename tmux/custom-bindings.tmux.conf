# vim: ft=tmux
# Binds that are a little bit more complex than other binds

bind f display-popup -h80% -w80% -E '\
$HOME/dotfiles/scripts/tm'

bind e display-popup -h80% -w80% '\
tmux attach -t espanso'

# bind p display-popup -E '\
# smug list | fzf --prompt "workspace: " --reverse |\
# xargs -I {} sh $HOME/.config/tmux/bin/load_workspaces.sh {}'


bind C-d new-window -a -c "#{pane_current_path}" "git diff main...HEAD"

# Agent launch binds — only register when the binary is present on $PATH,
# so this config stays portable across machines missing one or more agents.
if-shell -b 'command -v claude >/dev/null 2>&1' \
  'bind C-c new-window -a -c "#{pane_current_path}" "claude"' \
  ''

if-shell -b 'command -v opencode >/dev/null 2>&1' \
  'bind C-o new-window -a -c "#{pane_current_path}" "opencode"' \
  ''

if-shell -b 'command -v pi >/dev/null 2>&1' \
  'bind C-p new-window -a -c "#{pane_current_path}" "pi"' \
  ''

# GitHub Dashboard - check if gh is installed and has dash extension
if-shell -b 'command -v gh >/dev/null 2>&1 && gh extension list 2>/dev/null | grep -q "dlvhdr/gh-dash"' \
  'bind C-g run-shell "if tmux list-windows -F \"##{window_name}\" | grep -q \"^dash$\"; then tmux select-window -t dash; else tmux new-window -n dash \"gh dash\"; fi"' \
  ''

bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 90%,80% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find ^w workmux' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind \"ctrl-w:execute(
      session_name=\\\$(echo {2..} | sed \\\"s/\x1b\[[0-9;]*m//g\\\")
      session_path=\\\$(sesh list --json | jq -r \\\".[] | select(.Name == \\\\\\\"\\\$session_name\\\\\\\") | .Path\\\")
      tv workmux \\\$session_path
    )+abort\" \
    --preview-window 'right:55%' \
    --preview 'sesh preview {2..}'
)\""

bind w display-popup -h80% -w80% -E '\
tv workmux'

bind a display-popup -E '\
tmux list-windows -F "#{window_name}" |\
grep -v "$(tmux display-message -p "#{window_name}")" |\
fzf --prompt "Switch to window: " |\
xargs -I {} sh -c "tmux select-window -t \"{}\""'


