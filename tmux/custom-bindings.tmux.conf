# Grab item to Obsidian inbox (uses same repo detection as task tracking)
bind g command-prompt -p "Grab to inbox: " "run-shell '$HOME/dotfiles/tmux/bin/add-to-inbox.sh \"%1\"'"

# Shift Alt vim keys keys to switch windows
bind m split-window -h "yazi"
bind M split-window -v "yazi"

if-shell "command -v workmux" "bind C-s display-popup -h90% -w90% -E 'workmux dashboard'"

# From a workmux worktree, jump back to the project's main sesh session
if-shell "command -v workmux" "bind h run-shell '$HOME/dotfiles/tmux/bin/goto-workmux-main.sh \"#{pane_current_path}\"'"

